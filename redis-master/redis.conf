# Redis Master Configuration
# Auto-generated for Railway deployment

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Authentication
requirepass ${REDIS_PASSWORD}
masterauth ${REDIS_PASSWORD}

# Persistence - RDB
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# Persistence - AOF
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory Management
maxmemory ${REDIS_MAXMEMORY}
# noeviction (NOT allkeys-lru): this is the DURABLE broker instance — the TaskIQ streams,
# per-org streams, the DRR active-orgs ZSET, and rate-limit buckets must NEVER be silently
# evicted (allkeys-lru at maxmemory = lost jobs). TTL caches/SSE live on a SEPARATE allkeys-lru
# cache instance. Hardened from the icueth template default by NEOLO (scaling plan Phase S1).
maxmemory-policy noeviction

# Replication
replica-announce-ip ${RAILWAY_PRIVATE_DOMAIN}
replica-announce-port 6379
# durable-on-ack: the master refuses a write unless >=1 replica acked within max-lag, so no XADD is
# acked-to-caller without a replica copy (closes the async failover-gap loss). Safe because the
# topology runs 2 replicas (a single failover still leaves >=1 replica, so writes don't block).
min-replicas-to-write 1
min-replicas-max-lag 10

# Performance Tuning
tcp-keepalive 300
timeout 0
tcp-backlog 511

# Logging
loglevel notice
logfile ""

# Slow Log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client handling
maxclients 10000

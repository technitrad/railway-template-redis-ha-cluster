# Redis Sentinel Configuration
# Auto-generated for Railway deployment

# Network
bind 0.0.0.0
port 26379
protected-mode no

# Sentinel configuration
# quorum 2: with 3 Sentinels, 2 must agree the master is down to start a failover (safe minimum -
# a single Sentinel / a minority partition can't false-failover). NEOLO hardening (scaling Phase S1).
sentinel monitor mymaster ${MASTER_HOST} 6379 2
sentinel auth-pass mymaster ${REDIS_PASSWORD}
sentinel down-after-milliseconds mymaster 5000
sentinel parallel-syncs mymaster 1
sentinel failover-timeout mymaster 10000

# Announce IP for Railway internal network
sentinel announce-ip ${RAILWAY_PRIVATE_DOMAIN}
sentinel announce-port 26379
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# Logging
loglevel notice
logfile ""
